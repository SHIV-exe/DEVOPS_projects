---
# Role: nginx
# Purpose: Install and configure Nginx webserver on Ubuntu hosts.
# This role installs Nginx, deploys a basic config, and ensures the service is running.

- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Deploy Nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: Restart Nginx

- name: Ensure Nginx service is running and enabled
  service:
    name: nginx
    state: started
    enabled: yes
